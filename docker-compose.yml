services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/task_dash?schema=public
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: task_dash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

